<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggie Square Map Viewer</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">

    <style>
        /* Base Reset & Variables */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: #f4f4f4; }
        
        /* Top Navigation Bar */
        .top-bar { display: flex; justify-content: space-between; align-items: center; background: #333; color: white; padding: 10px 20px; z-index: 1000; }
        .top-bar h1 { font-size: 1.2rem; margin: 0; }
        .controls { display: flex; gap: 15px; align-items: center; }
        select, button { padding: 8px 12px; font-size: 14px; border: none; border-radius: 4px; cursor: pointer; }
        .mode-toggles button { background: #555; color: white; transition: background 0.2s; }
        .mode-toggles button.active { background: #007bff; font-weight: bold; }

        /* Main Layout */
        .main-container { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar (Editor Panel) */
        #sidebar { width: 320px; background: white; padding: 20px; overflow-y: auto; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 500; display: flex; flex-direction: column; gap: 15px; }
        
        /* Sidebar Toolbar Buttons */
        .editor-toolbar { display: flex; justify-content: space-between; gap: 5px; }
        .tool-btn { flex: 1; padding: 10px 5px; background: #e9ecef; color: #333; border: 1px solid #ccc; }
        .tool-btn.active { background: #007bff; color: white; border-color: #0056b3; }

        /* Sidebar Forms */
        #editor-form { display: flex; flex-direction: column; gap: 10px; border: 1px solid #ddd; padding: 15px; border-radius: 5px; background: #fafafa; }
        #editor-form label { font-weight: bold; font-size: 0.9em; display: flex; flex-direction: column; gap: 5px; }
        #editor-form input, #editor-form select, #editor-form textarea { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        #editor-form textarea { resize: vertical; min-height: 60px; }
        hr { border: 0; border-top: 1px solid #ddd; margin: 10px 0; }
        
        .session-management p { font-size: 0.9em; font-weight: bold; margin-bottom: 10px; }

        /* Map Area */
        #map { flex: 1; background: #ccc; cursor: grab; }
        #map:active { cursor: grabbing; }

        /* View Mode vs Edit Mode Toggles */
        body.view-mode #sidebar { display: none; }
        body.edit-mode #map { cursor: crosshair; }

        /* Tooltip Styles */
        .photo-tooltip { padding: 5px; border-radius: 6px; box-shadow: 0 3px 14px rgba(0,0,0,0.4); }
        .highlight-label { background: transparent; border: none; }

        /* Modal Styles */
        .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.9); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .modal-hidden { display: none !important; }
        .modal-content { background: #222; width: 90%; height: 90%; max-width: 1200px; display: flex; flex-direction: column; border-radius: 8px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #111; color: white; }
        .modal-header h2 { margin: 0; font-size: 1.2rem; font-weight: normal; }
        #close-modal { background: none; border: none; color: white; font-size: 28px; cursor: pointer; }
        #close-modal:hover { color: #dc3545; }
        
        /* Image Viewer Container */
        #viewer-container { flex: 1; display: flex; justify-content: center; align-items: center; background: #000; overflow: hidden; position: relative; }
        .standard-img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body class="view-mode">

    <div class="top-bar">
        <h1>Aggie Square Map Viewer</h1>
        <div class="controls">
            <select id="map-selector">
                <option value="overview">Overview Map</option>
                <option value="lvl1-north">Level 1, North Lobby</option>
                <option value="lvl1-south">Level 1, South Lobby</option>
                <option value="aggiecommons">Level 1, Aggie Commons</option>
                <option value="lvl2-social">Level 2, Social Lab</option>
                
            </select>
            <div class="mode-toggles">
                <button id="btn-view" class="active">View Mode</button>
                <button id="btn-edit">Edit Mode</button>
            </div>
        </div>
    </div>

    <div class="main-container">
        
        <div id="sidebar">
            
            <div class="editor-toolbar">
                <button id="btn-tool-point" class="tool-btn active" onclick="setTool('point')">📍 Point</button>
                <button id="btn-tool-measure" class="tool-btn" onclick="setTool('measure')">📏 Measure</button>
                <button id="btn-tool-highlight" class="tool-btn" onclick="setTool('highlight')">🟨 Highlight</button>
                <button id="btn-tool-video" class="tool-btn" onclick="setTool('video')">🎥 Video Path</button>
            </div>

            <form id="editor-form">
                <label>Title: 
                    <input type="text" id="edit-title" placeholder="Optional title">
                </label>
                <label>Comments: 
                    <textarea id="edit-comments" placeholder="Optional details..."></textarea>
                </label>
                <label>Image URL: 
                    <input type="text" id="edit-url" required placeholder="assets/photos/image.jpg">
                </label>
                <label>Photo Type:
                    <select id="edit-type">
                        <option value="panorama">360 Panorama</option>
                        <option value="directional">Standard Photo</option>
                    </select>
                </label>
                <label>Field of View (°): 
                    <input type="number" id="edit-fov" value="120" min="1" max="360">
                </label>
                <button type="submit" style="background: #28a745; color: white; font-weight: bold; margin-top: 5px;">💾 Save Point to Map</button>
                <button type="button" id="btn-cancel" style="background: #dc3545; color: white;">❌ Cancel Placement</button>
            </form>

            <hr>

            <div class="session-management">
                <p>Points Placed This Session: <span id="session-count">0</span></p>
                <button id="btn-download-batch" style="width: 100%; margin-bottom: 10px; background: #007bff; color: white; font-weight: bold;">📥 Download JSON Data</button>
                <button id="btn-floor-report" style="width: 100%; background: #17a2b8; color: white; font-weight: bold;">📄 Generate Floor Report</button>
            </div>
            
        </div>

        <div id="map"></div>
    </div>

    <div id="photo-modal" class="modal modal-hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Photo View</h2>
                <button id="close-modal" title="Close Viewer">&times;</button>
            </div>
            <div id="viewer-container"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <script src="js/map.js"></script>
    <script src="js/editor.js"></script>

</body>
</html>
